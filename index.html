<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>App de Ligações</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1e1e1e">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root {
    --bg: #122C30;
    --card: #1B3D41;
    --card-alto: #234852;
    --acao: #E14B3C;
    --acao-escuro: #B93A2E;
    --texto: #F4EDE1;
    --texto-fraco: #8FADA9;
    --sucesso: #4C9A6A;
    --borda: #2E5257;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'Space Grotesk', -apple-system, system-ui, sans-serif;
    background: var(--bg);
    color: var(--texto);
    min-height: 100vh;
  }
  .mono { font-family: 'IBM Plex Mono', monospace; }
  .tela { display: none; padding: 20px; max-width: 480px; margin: 0 auto; min-height: 100vh; }
  .tela.ativa { display: block; }
  h1 { font-size: 21px; font-weight: 700; margin: 0 0 16px; letter-spacing: 0.2px; }
  h2 { font-size: 15px; font-weight: 500; color: var(--texto-fraco); margin: 0 0 4px; text-transform: uppercase; letter-spacing: 0.5px; }
  .cartao {
    background: var(--card);
    border: 1px solid var(--borda);
    border-radius: 14px;
    padding: 20px;
    margin-bottom: 16px;
  }
  button {
    width: 100%;
    padding: 16px;
    border: none;
    border-radius: 10px;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 10px;
    cursor: pointer;
  }
  .btn-primario { background: var(--sucesso); color: #0f2318; }
  .btn-secundario { background: var(--card-alto); color: var(--texto); border: 1px solid var(--borda); }
  .btn-whatsapp { background: #1f5c3c; color: #d9f2e3; font-size: 14px; padding: 12px; font-weight: 600; }
  .btn-status { background: var(--card-alto); color: var(--texto); border: 2px solid var(--borda); text-align: left; }
  .btn-status.selecionado { border-color: var(--acao); background: rgba(225,75,60,0.15); }
  .btn-texto { background: transparent; color: var(--texto-fraco); text-decoration: underline; padding: 8px; font-weight: 400; font-size: 13px; }
  input[type="file"] { color: var(--texto); width: 100%; margin-bottom: 12px; }
  select {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: 1px solid var(--borda);
    background: var(--bg);
    color: var(--texto);
    font-size: 15px;
    font-family: 'Space Grotesk', sans-serif;
  }
  input[type="date"], input[type="time"], input[type="text"] {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: 1px solid var(--borda);
    background: var(--bg);
    color: var(--texto);
    font-size: 15px;
    font-family: 'IBM Plex Mono', monospace;
    margin-bottom: 10px;
  }
  .rotulo { font-size: 12px; color: var(--texto-fraco); margin-bottom: 6px; display: block; text-transform: uppercase; letter-spacing: 0.4px; }
  .progresso { font-size: 13px; color: var(--texto-fraco); margin-bottom: 16px; }
  .resumo-anterior {
    background: rgba(225,75,60,0.1);
    border: 1px solid rgba(225,75,60,0.35);
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 16px;
    font-size: 14px;
  }
  .resumo-anterior.novo { background: rgba(76,154,106,0.12); border-color: rgba(76,154,106,0.4); }
  .nome-lead { font-size: 22px; font-weight: 700; margin-bottom: 2px; }
  .telefone-lead { font-size: 16px; color: var(--texto-fraco); margin-bottom: 16px; }
  .erro { color: #ff8a7a; font-size: 14px; margin-top: 8px; }
  .aviso { color: var(--texto-fraco); font-size: 14px; }
  .fim-cartao { text-align: center; }
  .fim-numero { font-size: 44px; font-weight: 600; }
  a.link-ligar { text-decoration: none; display: block; }

  /* Botão de Ligar com pulso de sinal saindo, como uma chamada sendo emitida */
  .btn-ligar-pulse {
    position: relative;
    background: var(--acao);
    color: #fff5f2;
    overflow: visible;
    z-index: 1;
  }
  .btn-ligar-pulse::before, .btn-ligar-pulse::after {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: 10px;
    border: 2px solid var(--acao);
    opacity: 0.7;
    animation: pulso-ligar 1.8s ease-out infinite;
    pointer-events: none;
  }
  .btn-ligar-pulse::after { animation-delay: 0.9s; }
  @keyframes pulso-ligar {
    0% { transform: scale(1); opacity: 0.6; }
    100% { transform: scale(1.18); opacity: 0; }
  }

  .lista-card { background: var(--card); border: 1px solid var(--borda); border-radius: 14px; padding: 16px; margin-bottom: 12px; }
  .lista-nome { font-size: 17px; font-weight: 700; margin-bottom: 2px; }
  .lista-info { font-size: 13px; color: var(--texto-fraco); margin-bottom: 12px; font-family: 'IBM Plex Mono', monospace; }
  .barra-progresso { background: var(--bg); border-radius: 6px; height: 8px; margin-bottom: 12px; overflow: hidden; }
  .barra-progresso-preenchida { background: var(--sucesso); height: 100%; }
  .linha-status { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--borda); font-size: 14px; font-family: 'IBM Plex Mono', monospace; }
  .linha-status:last-child { border-bottom: none; }
</style>
</head>
<body>

<!-- TELA 0: INÍCIO (lista de listas) -->
<div class="tela ativa" id="tela-inicio">
  <h1>App de Ligações</h1>
  <div class="aviso" id="badge-pendentes" style="display:none; margin-bottom:12px;"></div>
  <div id="listas-container"></div>
  <button class="btn-primario" id="btn-ir-nova-lista">+ Nova lista</button>
</div>

<!-- TELA 1: UPLOAD -->
<div class="tela" id="tela-upload">
  <h1>Nova lista</h1>
  <div class="cartao">
    <span class="rotulo">Suba a lista (Excel)</span>
    <input type="file" id="input-arquivo" accept=".xlsx,.xls">
    <button class="btn-primario" id="btn-analisar">Analisar arquivo</button>
    <button class="btn-texto" id="btn-voltar-inicio-1">Voltar</button>
    <div class="erro" id="erro-upload"></div>
  </div>
</div>

<!-- TELA 1B: CONFIRMAR COLUNAS -->
<div class="tela" id="tela-colunas">
  <h1>Confirme as colunas</h1>
  <div class="cartao">
    <span class="rotulo">Nome desta lista</span>
    <input type="text" id="input-nome-lista" placeholder="Ex: Quentes 07/07">

    <span class="rotulo">Qual coluna é o Nome?</span>
    <select id="select-coluna-nome"></select>

    <div style="margin-top:14px;">
      <span class="rotulo">Qual coluna é o Telefone?</span>
      <select id="select-coluna-telefone"></select>
    </div>

    <div class="resumo-anterior novo" id="preview-colunas" style="margin-top:16px;"></div>

    <button class="btn-primario" id="btn-confirmar-colunas" style="margin-top:8px;">Carregar lista</button>
    <button class="btn-secundario" id="btn-cancelar-colunas">Escolher outro arquivo</button>
    <div class="erro" id="erro-colunas"></div>
  </div>
  <div class="aviso" id="status-envio"></div>
</div>

<!-- TELA 2: LIGAÇÃO -->
<div class="tela" id="tela-ligacao">
  <div class="progresso mono" id="progresso-fila"></div>
  <div class="cartao">
    <div class="nome-lead" id="lead-nome"></div>
    <div class="telefone-lead mono" id="lead-telefone"></div>

    <div id="resumo-anterior-box"></div>

    <a class="link-ligar" id="link-discar" href="#">
      <button class="btn-ligar-pulse">Ligar</button>
    </a>
    <button class="btn-secundario" id="btn-pular">Pular este contato</button>
  </div>
</div>

<!-- TELA 3: RESULTADO -->
<div class="tela" id="tela-resultado">
  <div class="cartao">
    <h2>Resultado da ligação</h2>
    <div class="nome-lead" id="resultado-nome" style="font-size:18px; margin-bottom:16px;"></div>

    <span class="rotulo">Status</span>
    <button class="btn-status" data-status="Agendou">Agendou</button>
    <button class="btn-status" data-status="Não atendeu">Não atendeu</button>
    <button class="btn-status" data-status="Sem interesse">Sem interesse</button>

    <div style="margin-top:16px;">
      <span class="rotulo">Data do contato</span>
      <input type="date" id="input-data">
      <span class="rotulo">Horário</span>
      <input type="time" id="input-horario">
    </div>

    <button class="btn-primario" id="btn-salvar-resultado" style="margin-top:8px;">Salvar e continuar</button>
    <div class="erro" id="erro-resultado"></div>
  </div>

  <div class="cartao">
    <span class="rotulo">Mensagem rápida (opcional) — abre o WhatsApp com o texto pronto</span>
    <button class="btn-whatsapp" data-msg="apresentacao">Enviar apresentação</button>
    <button class="btn-whatsapp" data-msg="nao_atendeu">Enviar "tentei ligar"</button>
    <button class="btn-whatsapp" data-msg="reuniao">Enviar confirmação de reunião</button>
  </div>
</div>

<!-- TELA 4: FIM DA FILA -->
<div class="tela" id="tela-fim">
  <div class="cartao fim-cartao">
    <div class="fim-numero mono" id="fim-total"></div>
    <div class="aviso">contatos concluídos nesta rodada</div>
  </div>
  <div class="cartao" id="fim-breakdown"></div>
  <button class="btn-primario" id="btn-repetir-nao-atendeu">Ligar de novo para quem não atendeu</button>
  <button class="btn-secundario" id="btn-voltar-inicio-fim">Voltar ao início</button>
</div>

<script>
// ===================== CONFIGURAÇÃO =====================
const URL_BACKEND = "https://script.google.com/macros/s/AKfycbxkWlQqiBV6J8SYt9JYvmhcDJ3E4Je7NKH1z2IHnlfge_NNZ3tg14bjvXYCkcDx4m05RQ/exec";
const CHAVE_STORAGE = "app_ligacoes_listas";
const CHAVE_PENDENTES = "app_ligacoes_pendentes";

const MENSAGENS_WHATSAPP = {
  apresentacao: "Opa! Aqui é o Isaque do Consórcio 👋",
  nao_atendeu: "Oi {nome}, tentei falar com você por telefone e não consegui. Pode me retornar quando puder?",
  reuniao: "Show, {nome}! Fico te aguardando na nossa reunião. Qualquer coisa me chama por aqui."
};

// ===================== ESTADO =====================
let listaAtual = null;   // objeto da lista sendo trabalhada agora
let ordemFila = [];      // índices (dentro de listaAtual.leads) que ainda faltam nesta rodada
let ponteiro = 0;        // posição atual dentro de ordemFila
let statusSelecionado = null;
let linhasBrutas = [];
let colunasDetectadas = [];
let mapaHistorico = {};  // telefone normalizado -> {status, data, horario}, carregado 1x por sessão de ligação

function normalizarTelefone(telefone) {
  return String(telefone || "").replace(/\D/g, "");
}

// ===================== ARMAZENAMENTO LOCAL (listas salvas no aparelho) =====================
function carregarListas() {
  try {
    return JSON.parse(localStorage.getItem(CHAVE_STORAGE)) || [];
  } catch (e) {
    return [];
  }
}

function salvarListas(listas) {
  localStorage.setItem(CHAVE_STORAGE, JSON.stringify(listas));
}

function persistirListaAtual() {
  const listas = carregarListas();
  const indice = listas.findIndex(l => l.id === listaAtual.id);
  if (indice === -1) {
    listas.push(listaAtual);
  } else {
    listas[indice] = listaAtual;
  }
  salvarListas(listas);
}

// ===================== FILA DE SINCRONIZAÇÃO EM SEGUNDO PLANO =====================
// Salvar na planilha não trava mais a navegação: a gente atualiza a tela
// na hora e manda pro backend por trás. Se falhar (sem internet, etc.),
// fica guardado aqui e tenta de novo automaticamente.
function carregarFilaPendente() {
  try {
    return JSON.parse(localStorage.getItem(CHAVE_PENDENTES)) || [];
  } catch (e) {
    return [];
  }
}

function salvarFilaPendente(fila) {
  localStorage.setItem(CHAVE_PENDENTES, JSON.stringify(fila));
}

function enviarResultadoEmSegundoPlano(item) {
  chamarBackend({ action: "salvarResultado", ...item })
    .then(resultado => {
      if (!resultado.ok) throw new Error(resultado.erro || "falha");
    })
    .catch(() => {
      const fila = carregarFilaPendente();
      fila.push(item);
      salvarFilaPendente(fila);
      atualizarBadgePendentes();
    });
}

async function tentarSincronizarPendentes() {
  const fila = carregarFilaPendente();
  if (!fila.length) return;

  const restantes = [];
  for (const item of fila) {
    try {
      const resultado = await chamarBackend({ action: "salvarResultado", ...item });
      if (!resultado.ok) restantes.push(item);
    } catch (e) {
      restantes.push(item);
    }
  }
  salvarFilaPendente(restantes);
  atualizarBadgePendentes();
}

function atualizarBadgePendentes() {
  const box = document.getElementById("badge-pendentes");
  if (!box) return;
  const fila = carregarFilaPendente();
  if (fila.length) {
    box.textContent = `${fila.length} contato(s) aguardando sincronizar com a planilha...`;
    box.style.display = "block";
  } else {
    box.style.display = "none";
  }
}

// ===================== HISTÓRICO EM LOTE (1 chamada por sessão, não 1 por lead) =====================
async function carregarHistoricoCompleto() {
  try {
    const resultado = await chamarBackend({ action: "listarLeads" });
    mapaHistorico = {};
    (resultado.leads || []).forEach(l => {
      mapaHistorico[normalizarTelefone(l.telefone)] = l;
    });
  } catch (e) {
    mapaHistorico = {};
  }
}

// ===================== NAVEGAÇÃO ENTRE TELAS =====================
function mostrarTela(id) {
  document.querySelectorAll(".tela").forEach(t => t.classList.remove("ativa"));
  document.getElementById(id).classList.add("ativa");
}

// ===================== COMUNICAÇÃO COM O BACKEND =====================
async function chamarBackend(payload) {
  const resposta = await fetch(URL_BACKEND, {
    method: "POST",
    headers: { "Content-Type": "text/plain;charset=utf-8" },
    body: JSON.stringify(payload)
  });
  const texto = await resposta.text();
  return JSON.parse(texto);
}

// ===================== TELA 0: INÍCIO =====================
function renderizarTelaInicio() {
  const listas = carregarListas();
  const container = document.getElementById("listas-container");

  if (!listas.length) {
    container.innerHTML = `<div class="aviso">Nenhuma lista carregada ainda.</div>`;
    return;
  }

  container.innerHTML = "";
  // Mais recentes primeiro
  listas.slice().reverse().forEach(lista => {
    const concluidos = lista.leads.filter(l => l.status).length;
    const total = lista.leads.length;
    const percentual = total ? Math.round((concluidos / total) * 100) : 0;
    const dataFormatada = new Date(lista.criadaEm).toLocaleDateString("pt-BR");

    const card = document.createElement("div");
    card.className = "lista-card";
    card.innerHTML = `
      <div class="lista-nome">${lista.nome}</div>
      <div class="lista-info">${dataFormatada} • ${concluidos}/${total} concluídos</div>
      <div class="barra-progresso"><div class="barra-progresso-preenchida" style="width:${percentual}%"></div></div>
    `;

    const botao = document.createElement("button");
    botao.className = concluidos < total ? "btn-primario" : "btn-secundario";
    botao.textContent = concluidos < total ? "Continuar" : "Ver resumo";
    botao.addEventListener("click", () => abrirLista(lista.id, concluidos < total));
    card.appendChild(botao);

    const btnExcluir = document.createElement("button");
    btnExcluir.className = "btn-texto";
    btnExcluir.textContent = "Remover desta lista de listas (não apaga da planilha)";
    btnExcluir.addEventListener("click", () => {
      if (confirm(`Remover "${lista.nome}" do aparelho? Os dados continuam na planilha.`)) {
        salvarListas(carregarListas().filter(l => l.id !== lista.id));
        renderizarTelaInicio();
      }
    });
    card.appendChild(btnExcluir);

    container.appendChild(card);
  });
}

async function abrirLista(id, continuarLigando) {
  const listas = carregarListas();
  listaAtual = listas.find(l => l.id === id);
  if (!listaAtual) return;

  if (continuarLigando) {
    ordemFila = listaAtual.leads
      .map((lead, indice) => indice)
      .filter(indice => !listaAtual.leads[indice].status);
    ponteiro = 0;

    // Busca o histórico de todos os leads de uma vez só (1 chamada),
    // em vez de 1 chamada por lead — é isso que deixava lento entre um e outro.
    await carregarHistoricoCompleto();
    mostrarProximoLead();
  } else {
    mostrarTelaFim();
  }
}

document.getElementById("btn-ir-nova-lista").addEventListener("click", () => {
  document.getElementById("erro-upload").textContent = "";
  mostrarTela("tela-upload");
});

document.getElementById("btn-voltar-inicio-1").addEventListener("click", () => {
  renderizarTelaInicio();
  mostrarTela("tela-inicio");
});

// ===================== TELA 1: ANALISAR ARQUIVO =====================
document.getElementById("btn-analisar").addEventListener("click", () => {
  const arquivoInput = document.getElementById("input-arquivo");
  const erroBox = document.getElementById("erro-upload");
  erroBox.textContent = "";

  if (!arquivoInput.files.length) {
    erroBox.textContent = "Escolha um arquivo Excel primeiro.";
    return;
  }

  const arquivo = arquivoInput.files[0];
  const leitor = new FileReader();

  leitor.onload = (e) => {
    try {
      const dados = new Uint8Array(e.target.result);
      const planilha = XLSX.read(dados, { type: "array" });
      const primeiraAba = planilha.Sheets[planilha.SheetNames[0]];
      const linhas = XLSX.utils.sheet_to_json(primeiraAba, { defval: "" });

      if (!linhas.length) {
        erroBox.textContent = "A planilha está vazia.";
        return;
      }

      linhasBrutas = linhas;
      colunasDetectadas = Object.keys(linhas[0]);

      montarTelaColunas(arquivo.name);
    } catch (err) {
      erroBox.textContent = "Não consegui ler esse arquivo: " + err.message;
    }
  };

  leitor.readAsArrayBuffer(arquivo);
});

// ===================== TELA 1B: CONFIRMAR COLUNAS =====================
function montarTelaColunas(nomeArquivo) {
  const selectNome = document.getElementById("select-coluna-nome");
  const selectTelefone = document.getElementById("select-coluna-telefone");
  selectNome.innerHTML = "";
  selectTelefone.innerHTML = "";

  colunasDetectadas.forEach(coluna => {
    selectNome.appendChild(new Option(coluna, coluna));
    selectTelefone.appendChild(new Option(coluna, coluna));
  });

  const chuteNome = colunasDetectadas.find(k => k.toLowerCase().includes("nome"));
  const chuteTelefone = colunasDetectadas.find(k => k.toLowerCase().includes("tel") || k.toLowerCase().includes("fone"));
  if (chuteNome) selectNome.value = chuteNome;
  if (chuteTelefone) selectTelefone.value = chuteTelefone;
  else if (colunasDetectadas.length > 1) selectTelefone.value = colunasDetectadas[1];

  const sugestaoNome = nomeArquivo ? nomeArquivo.replace(/\.(xlsx|xls)$/i, "") : "";
  document.getElementById("input-nome-lista").value = sugestaoNome;

  atualizarPreviewColunas();
  document.getElementById("status-envio").textContent = "";
  document.getElementById("erro-colunas").textContent = "";
  mostrarTela("tela-colunas");
}

function atualizarPreviewColunas() {
  const colNome = document.getElementById("select-coluna-nome").value;
  const colTelefone = document.getElementById("select-coluna-telefone").value;
  const exemplo = linhasBrutas[0];
  const previewBox = document.getElementById("preview-colunas");
  previewBox.textContent = `Exemplo (linha 1): ${exemplo[colNome]} — ${exemplo[colTelefone]}   •   ${linhasBrutas.length} linhas no total`;
}

document.getElementById("select-coluna-nome").addEventListener("change", atualizarPreviewColunas);
document.getElementById("select-coluna-telefone").addEventListener("change", atualizarPreviewColunas);

document.getElementById("btn-cancelar-colunas").addEventListener("click", () => {
  mostrarTela("tela-upload");
});

document.getElementById("btn-confirmar-colunas").addEventListener("click", async () => {
  const colNome = document.getElementById("select-coluna-nome").value;
  const colTelefone = document.getElementById("select-coluna-telefone").value;
  const nomeLista = document.getElementById("input-nome-lista").value.trim();
  const erroBox = document.getElementById("erro-colunas");
  const statusBox = document.getElementById("status-envio");
  erroBox.textContent = "";

  if (!nomeLista) {
    erroBox.textContent = "Dá um nome pra essa lista, pra você reconhecer ela depois.";
    return;
  }

  if (colNome === colTelefone) {
    erroBox.textContent = "Nome e Telefone não podem ser a mesma coluna.";
    return;
  }

  const leadsProcessados = linhasBrutas
    .map(l => ({ nome: String(l[colNome] || "").trim(), telefone: String(l[colTelefone] || "").trim(), status: "", data: "", horario: "" }))
    .filter(l => l.telefone);

  if (!leadsProcessados.length) {
    erroBox.textContent = "Nenhuma linha tem telefone preenchido nessa coluna.";
    return;
  }

  const botao = document.getElementById("btn-confirmar-colunas");
  botao.disabled = true;
  statusBox.textContent = `Enviando ${leadsProcessados.length} contatos para a planilha...`;

  try {
    const resultado = await chamarBackend({
      action: "upload",
      leads: leadsProcessados.map(l => ({ nome: l.nome, telefone: l.telefone }))
    });

    if (!resultado.ok) {
      erroBox.textContent = "Erro ao salvar na planilha: " + resultado.erro;
      statusBox.textContent = "";
      return;
    }

    statusBox.textContent = `${resultado.novos} novos, ${resultado.ignorados} já existiam.`;

    listaAtual = {
      id: String(Date.now()),
      nome: nomeLista,
      criadaEm: new Date().toISOString(),
      leads: leadsProcessados
    };
    persistirListaAtual();

    ordemFila = listaAtual.leads.map((_, indice) => indice);
    ponteiro = 0;

    statusBox.textContent += " Carregando histórico...";
    await carregarHistoricoCompleto();
    mostrarProximoLead();
  } catch (err) {
    erroBox.textContent = "Sem conexão. Tente novamente.";
  } finally {
    botao.disabled = false;
  }
});

// ===================== TELA 2: LIGAÇÃO =====================
function mostrarProximoLead() {
  if (ponteiro >= ordemFila.length) {
    mostrarTelaFim();
    return;
  }

  const lead = listaAtual.leads[ordemFila[ponteiro]];
  const concluidosAteAgora = listaAtual.leads.filter(l => l.status).length;
  document.getElementById("progresso-fila").textContent = `${listaAtual.nome} — ${concluidosAteAgora}/${listaAtual.leads.length} concluídos`;
  document.getElementById("lead-nome").textContent = lead.nome || "(sem nome)";
  document.getElementById("lead-telefone").textContent = lead.telefone;
  document.getElementById("link-discar").href = "tel:" + lead.telefone.replace(/\s/g, "");

  // Leitura instantânea, direto da memória (já carregamos tudo de uma vez ao abrir a lista)
  const resumoBox = document.getElementById("resumo-anterior-box");
  const historico = mapaHistorico[normalizarTelefone(lead.telefone)];
  if (historico && historico.status) {
    resumoBox.innerHTML = `<div class="resumo-anterior">Última vez: ${historico.data || ""} ${historico.horario || ""} — <strong>${historico.status}</strong></div>`;
  } else {
    resumoBox.innerHTML = `<div class="resumo-anterior novo">Primeiro contato com este lead</div>`;
  }

  mostrarTela("tela-ligacao");
}

document.getElementById("link-discar").addEventListener("click", () => {
  setTimeout(() => abrirTelaResultado(), 300);
});

document.getElementById("btn-pular").addEventListener("click", () => {
  ponteiro++;
  mostrarProximoLead();
});

// ===================== TELA 3: RESULTADO =====================
function abrirTelaResultado() {
  const lead = listaAtual.leads[ordemFila[ponteiro]];
  document.getElementById("resultado-nome").textContent = lead.nome + " — " + lead.telefone;
  document.getElementById("erro-resultado").textContent = "";
  statusSelecionado = null;
  document.querySelectorAll(".btn-status").forEach(b => b.classList.remove("selecionado"));

  const agora = new Date();
  document.getElementById("input-data").value = agora.toISOString().slice(0, 10);
  document.getElementById("input-horario").value = agora.toTimeString().slice(0, 5);

  mostrarTela("tela-resultado");
}

document.querySelectorAll(".btn-status").forEach(botao => {
  botao.addEventListener("click", () => {
    statusSelecionado = botao.dataset.status;
    document.querySelectorAll(".btn-status").forEach(b => b.classList.remove("selecionado"));
    botao.classList.add("selecionado");
  });
});

document.getElementById("btn-salvar-resultado").addEventListener("click", () => {
  const erroBox = document.getElementById("erro-resultado");
  erroBox.textContent = "";

  if (!statusSelecionado) {
    erroBox.textContent = "Escolha um status antes de continuar.";
    return;
  }

  const indiceLead = ordemFila[ponteiro];
  const lead = listaAtual.leads[indiceLead];
  const data = document.getElementById("input-data").value;
  const horario = document.getElementById("input-horario").value;

  // Atualiza tudo localmente e já avança — não espera a planilha responder.
  listaAtual.leads[indiceLead] = { ...lead, status: statusSelecionado, data: data, horario: horario };
  persistirListaAtual();
  mapaHistorico[normalizarTelefone(lead.telefone)] = { nome: lead.nome, telefone: lead.telefone, status: statusSelecionado, data: data, horario: horario };

  // Envia pra planilha por trás; se falhar, entra na fila de pendências e tenta de novo depois.
  enviarResultadoEmSegundoPlano({ nome: lead.nome, telefone: lead.telefone, status: statusSelecionado, data: data, horario: horario });

  ponteiro++;
  mostrarProximoLead();
});

// ===================== MENSAGENS RÁPIDAS DE WHATSAPP =====================
function normalizarParaWhatsapp(telefone) {
  let digitos = String(telefone || "").replace(/\D/g, "");
  if (digitos.length <= 11) digitos = "55" + digitos; // assume Brasil se não tiver DDI
  return digitos;
}

document.querySelectorAll(".btn-whatsapp").forEach(botao => {
  botao.addEventListener("click", () => {
    const indiceLead = ordemFila[ponteiro];
    const lead = listaAtual.leads[indiceLead];
    const chaveMensagem = botao.dataset.msg;
    const texto = MENSAGENS_WHATSAPP[chaveMensagem].replace("{nome}", lead.nome || "");
    const numero = normalizarParaWhatsapp(lead.telefone);
    const link = `https://wa.me/${numero}?text=${encodeURIComponent(texto)}`;
    window.open(link, "_blank");
  });
});

// ===================== TELA 4: FIM =====================
function mostrarTelaFim() {
  const concluidosNestaRodada = ordemFila.length - (ordemFila.length - ponteiro);
  document.getElementById("fim-total").textContent = ponteiro;

  const contagem = {};
  listaAtual.leads.forEach(l => {
    const chave = l.status || "Ainda não ligado";
    contagem[chave] = (contagem[chave] || 0) + 1;
  });

  const breakdownBox = document.getElementById("fim-breakdown");
  breakdownBox.innerHTML = Object.keys(contagem)
    .map(status => `<div class="linha-status"><span>${status}</span><span>${contagem[status]}</span></div>`)
    .join("");

  const temNaoAtendeu = listaAtual.leads.some(l => l.status === "Não atendeu");
  document.getElementById("btn-repetir-nao-atendeu").style.display = temNaoAtendeu ? "block" : "none";

  mostrarTela("tela-fim");
}

document.getElementById("btn-repetir-nao-atendeu").addEventListener("click", () => {
  ordemFila = listaAtual.leads
    .map((lead, indice) => indice)
    .filter(indice => listaAtual.leads[indice].status === "Não atendeu");
  ponteiro = 0;
  mostrarProximoLead();
});

document.getElementById("btn-voltar-inicio-fim").addEventListener("click", () => {
  renderizarTelaInicio();
  mostrarTela("tela-inicio");
});

// ===================== INÍCIO =====================
renderizarTelaInicio();
atualizarBadgePendentes();
tentarSincronizarPendentes().then(() => atualizarBadgePendentes());

// ===================== REGISTRO DO SERVICE WORKER (PWA) =====================
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js").catch(() => {});
  });
}
</script>
